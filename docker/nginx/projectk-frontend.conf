server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ready";
    }

    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        try_files /env.js =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
