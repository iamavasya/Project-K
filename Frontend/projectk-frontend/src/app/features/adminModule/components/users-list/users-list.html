<div class="users-list-shell">
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>
    <p-table #usersTable [value]="users" dataKey="userId" editMode="row" styleClass="project-table" [globalFilterFields]="['email', 'firstName', 'lastName']"
             rowGroupMode="subheader" groupRowsBy="kurinNumber" [sortField]="'kurinNumber'" sortMode="single">
        <ng-template #caption>
            <div class="users-list-caption">
                <div>
                    <h2>Користувачі</h2>
                    <p>{{ users.length }} облікових записів</p>
                </div>
                <p-iconfield iconPosition="left">
                    <p-inputicon>
                        <i class="pi pi-search"></i>
                    </p-inputicon>
                    <input pInputText type="text" (input)="usersTable.filterGlobal($event.target.value, 'contains')" placeholder="Пошук за імʼям або email" />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th id="firstName">Імʼя</th>
                <th id="lastName">Прізвище</th>
                <th id="email">Email</th>
                <th id="role">Роль</th>
                <th id="actions" class="users-list-actions">Дії</th>
            </tr>
        </ng-template>
        <ng-template #groupheader let-user>
            <tr pRowGroupHeader class="users-list-group-row">
                <td colspan="5">
                    <button type="button" pButton pRipple class="p-button-text p-button-rounded p-button-plain mr-2" 
                            [icon]="expandedRows[user.kurinNumber?.toString() ?? 'null'] ? 'pi pi-chevron-down' : 'pi pi-chevron-right'" 
                            (click)="toggleGroup(user.kurinNumber)"
                            aria-label="Перемкнути групу користувачів"></button>
                    <span class="font-bold ml-2">{{ getKurinGroupLabel(user.kurinNumber) }}</span>
                </td>
            </tr>
        </ng-template>
        <ng-template #body let-user let-editing="editing" let-ri="rowIndex">
            @if (expandedRows[user.kurinNumber?.toString() ?? 'null']) {
                <tr [pEditableRow]="user" class="users-list-row">
                    <td data-mobile-label="Імʼя">
                        {{user.firstName}}
                    </td>
                    <td data-mobile-label="Прізвище">
                        {{user.lastName}}
                    </td>
                    <td data-mobile-label="Email">
                        {{user.email}}
                    </td>
                    <td data-mobile-label="Роль">
                        <p-cellEditor>
                            <ng-template #input>
                                <p-select [options]="roles" [(ngModel)]="user.role" optionLabel="label" optionValue="label" appendTo="body"></p-select>
                            </ng-template>
                            <ng-template #output>
                                {{user.role}}
                            </ng-template>
                        </p-cellEditor>
                    </td>
                    <td class="users-list-actions" data-mobile-label="Дії">
                        <div class="flex gap-2">
                            @if (!editing) {
                                <button
                                    pButton
                                    type="button"
                                    pInitEditableRow
                                    icon="pi pi-pencil"
                                    (click)="onRowEditInit(user)"
                                    aria-label="Редагувати користувача"
                                    text
                                    rounded
                                    severity="secondary">
                                </button>
                                <button
                                    pButton
                                    type="button"
                                    icon="pi pi-trash"
                                    (click)="deleteUser(user)"
                                    aria-label="Видалити користувача"
                                    text
                                    rounded
                                    severity="danger">
                                </button>
                            }
                            @else if (editing) {
                                <button
                                    pButton
                                    type="button"
                                    pSaveEditableRow
                                    icon="pi pi-check"
                                    (click)="onRowEditSave(user)"
                                    aria-label="Зберегти зміни"
                                    text
                                    rounded
                                    severity="success">
                                </button>
                                <button
                                    pButton
                                    type="button"
                                    pCancelEditableRow
                                    icon="pi pi-times"
                                    (click)="onRowEditCancel(user, ri)"
                                    aria-label="Скасувати редагування"
                                    text
                                    rounded
                                    severity="danger">
                                </button>
                            }
                        </div>
                    </td>
                </tr>
            }
        </ng-template>
    </p-table>
</div>
