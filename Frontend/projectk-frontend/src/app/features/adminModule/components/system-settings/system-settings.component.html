<section class="settings-page">
  <header class="settings-header">
    <div>
      <p class="settings-eyebrow">Глобальні налаштування</p>
      <h1>Система</h1>
    </div>
    <p-button
      label="Назад"
      icon="pi pi-arrow-left"
      severity="secondary"
      variant="text"
      (onClick)="back()" />
  </header>

  <section class="settings-section" aria-labelledby="security-title">
    <h2 id="security-title" class="settings-section-title">Безпека</h2>

    <div class="setting-row">
      <div class="setting-copy">
        <h3>Обов'язкова MFA для привілейованих ролей</h3>
        <p>
          Вимагати двофакторну автентифікацію для адміністраторів і менеджерів.
          Якщо вимкнено — MFA необов'язкова.
        </p>
      </div>
      <p-toggleswitch
        [(ngModel)]="enforcePrivilegedMfa"
        (onChange)="onMfaToggle($event)"
        [disabled]="loading"
        inputId="enforcePrivilegedMfa" />
    </div>
  </section>
</section>
