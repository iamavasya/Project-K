<main class="login-page">
  <section class="login-panel" aria-labelledby="login-title">
    <div class="login-heading">
      <h1 id="login-title">{{ showOtpInput ? 'Підтвердження входу' : 'Вхід' }}</h1>
      <p>
        {{ showOtpInput ? 'Введіть код із застосунку автентифікації.' : 'Увійдіть у свій обліковий запис.' }}
      </p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <ng-container *ngIf="!showOtpInput">
        <p-floatlabel variant="on" class="field">
          <input
            pInputText
            id="email"
            [(ngModel)]="email"
            name="email"
            autocomplete="email"
            required
          />
          <label for="email">Email</label>
        </p-floatlabel>

        <p-floatlabel variant="on" class="field">
          <p-password
            inputId="password"
            [(ngModel)]="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            autocomplete="current-password"
            styleClass="password-field"
            inputStyleClass="password-input"
            required
          />
          <label for="password">Пароль</label>
        </p-floatlabel>
      </ng-container>

      <ng-container *ngIf="showOtpInput">
        <div *ngIf="!useRecoveryCode" class="otp-field">
          <label for="otp">Код підтвердження</label>
          <p-inputotp
            inputId="otp"
            name="otp"
            [ngModel]="otpValue"
            (ngModelChange)="onOtpChange($event)"
            [length]="6"
            [integerOnly]="true"
            styleClass="otp-inputs"
          />
        </div>

        <p-floatlabel *ngIf="useRecoveryCode" variant="on" class="field">
          <input
            pInputText
            id="recoveryCode"
            [ngModel]="otpValue"
            (ngModelChange)="onRecoveryCodeChange($event)"
            name="recoveryCode"
            autocomplete="one-time-code"
            required
          />
          <label for="recoveryCode">Recovery code</label>
        </p-floatlabel>
      </ng-container>

      <div class="login-actions">
        <p-button
          [label]="showOtpInput ? 'Підтвердити і увійти' : 'Увійти'"
          [loading]="loading"
          [disabled]="!canSubmit"
          type="submit"
          styleClass="w-full"
        />

        <p-button
          *ngIf="showOtpInput"
          [label]="useRecoveryCode ? 'Use authenticator code' : 'Use recovery code'"
          type="button"
          variant="text"
          (onClick)="toggleRecoveryCode()"
          styleClass="w-full"
        />

        <p-button
          *ngIf="showOtpInput"
          label="Назад"
          icon="pi pi-arrow-left"
          type="button"
          variant="text"
          (onClick)="backToPassword()"
          styleClass="w-full"
        />
      </div>
    </form>

    <p *ngIf="!showOtpInput" class="join-link">
      Немає облікового запису?
      <a routerLink="/join">Подати заявку</a>
    </p>
  </section>
</main>
