<div class="group-shell">
    <section class="group-hero group-tile">
        <div class="group-hero__icon">
            <app-group-chevron></app-group-chevron>
        </div>

        <div class="group-hero__copy">
            <span class="group-hero__eyebrow">Гурток</span>
            <h1>{{ group?.name || 'Гурток' }}</h1>
            @if (group?.kurinNumber) {
                <p>{{ group?.kurinNumber }} курінь</p>
            }
        </div>

        <div class="group-actions">
            @if (canManageMembers) {
                <p-button label="Додати учасника" (onClick)="onMemberCreate()" severity="info" icon="pi pi-plus" />
            }
            @if (canManageMentors) {
                <p-button label="Виховники" (onClick)="openMentorDialog()" severity="secondary" icon="pi pi-users" />
            }
        </div>
    </section>

    <section class="group-tile">
        <app-leadership-panel [leadershipType]="'group'" [typeKey]="groupKey"></app-leadership-panel>
    </section>

    <section class="group-tile">
        <app-member-list [type]="'group'" [typeKey]="groupKey"></app-member-list>
    </section>
</div>

<p-dialog [(visible)]="mentorDialogVisible" [modal]="true" [closable]="true" [style]="{ width: 'min(92vw, 34rem)' }" header="Налаштування виховників гуртка">
    <div class="mentor-dialog-body">
        <p class="mentor-dialog-hint">Оберіть виховників із КВ, які матимуть доступ до цього гуртка.</p>
        <p-multiselect
            [options]="mentorOptions"
            [(ngModel)]="selectedMentorUserKeys"
            optionLabel="label"
            optionValue="value"
            [filter]="true"
            filterBy="label"
            display="chip"
            placeholder="Оберіть виховників"
            [style]="{ width: '100%' }">
        </p-multiselect>
    </div>
    <ng-template pTemplate="footer">
        <div class="mentor-dialog-actions">
            <p-button label="Скасувати" severity="secondary" [outlined]="true" (onClick)="mentorDialogVisible = false" />
            <p-button label="Зберегти" [loading]="mentorSaveInProgress" (onClick)="saveMentorAssignments()" />
        </div>
    </ng-template>
</p-dialog>
