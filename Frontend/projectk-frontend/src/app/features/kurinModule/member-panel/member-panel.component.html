<div class="group-panel">
    <p-table [value]="members" selectionMode="single" [(selection)]="selectedMember" dataKey="memberKey" (onRowSelect)="onMemberSelect($event)">
        <ng-template #header>
            <tr>
                @for (header of tableHeaders; track header) {
                    <th scope="col">{{ header }}</th>
                }
            </tr>
        </ng-template>
        <ng-template #body let-member>
            <tr [pSelectableRow]="member">
                <td>{{ member.memberKey }}</td>
                <td>{{ member.firstName }}</td>
                <td>{{ member.lastName }}</td>
            </tr>
        </ng-template>
    </p-table>
    <p-button label="Додати учасника" severity="info" icon="pi pi-plus" iconPos="right" />
</div>
