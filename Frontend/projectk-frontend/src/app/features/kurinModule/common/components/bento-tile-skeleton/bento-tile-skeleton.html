<section
    class="bento-tile-skeleton rounded-2xl p-4 md:p-5"
    [class.bento-tile-skeleton--compact]="size() === 'compact'"
    [class.bento-tile-skeleton--tall]="size() === 'tall'"
    role="status"
    aria-busy="true"
    aria-live="polite"
>
    <div class="bento-ribbon">
        <span class="bento-ribbon__text">{{ ribbonLabel() }}</span>
    </div>

    <div class="bento-header flex flex-wrap items-center justify-between gap-3">
        <p-skeleton width="45%" height="1.5rem" borderRadius="0.75rem"></p-skeleton>
        <p-skeleton width="5rem" height="1.25rem" borderRadius="999px"></p-skeleton>
    </div>

    @switch (variant()) {
        @case ('stats') {
            <div class="bento-content mt-4 grid grid-cols-6 gap-3">
                <p-skeleton class="col-span-6 md:col-span-4" width="100%" height="6.5rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-3 md:col-span-2" width="100%" height="6.5rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-3 md:col-span-2" width="100%" height="6.5rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-6" width="100%" height="2.75rem" borderRadius="0.75rem"></p-skeleton>
            </div>
        }
        @case ('list') {
            <div class="bento-content mt-4 space-y-2.5">
                <p-skeleton width="85%" height="1.2rem" borderRadius="0.75rem"></p-skeleton>
                <p-skeleton width="100%" height="1.2rem" borderRadius="0.75rem"></p-skeleton>
                <p-skeleton width="90%" height="1.2rem" borderRadius="0.75rem"></p-skeleton>
                <p-skeleton width="72%" height="1.2rem" borderRadius="0.75rem"></p-skeleton>
                <div class="mt-4 grid grid-cols-6 gap-3">
                    <p-skeleton class="col-span-4" width="100%" height="3.5rem" borderRadius="0.9rem"></p-skeleton>
                    <p-skeleton class="col-span-2" width="100%" height="3.5rem" borderRadius="0.9rem"></p-skeleton>
                </div>
            </div>
        }
        @case ('media') {
            <div class="bento-content mt-4 grid grid-cols-6 gap-3">
                <p-skeleton class="col-span-6 md:col-span-3" width="100%" height="7.5rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-6 md:col-span-3" width="100%" height="7.5rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-4" width="100%" height="2.75rem" borderRadius="0.75rem"></p-skeleton>
                <p-skeleton class="col-span-2" width="100%" height="2.75rem" borderRadius="0.75rem"></p-skeleton>
            </div>
        }
        @default {
            <div class="bento-content mt-4 grid grid-cols-6 gap-3">
                <p-skeleton class="col-span-6" width="100%" height="7rem" borderRadius="0.9rem"></p-skeleton>
                <p-skeleton class="col-span-4" width="100%" height="2.75rem" borderRadius="0.75rem"></p-skeleton>
                <p-skeleton class="col-span-2" width="100%" height="2.75rem" borderRadius="0.75rem"></p-skeleton>
            </div>
        }
    }
</section>
