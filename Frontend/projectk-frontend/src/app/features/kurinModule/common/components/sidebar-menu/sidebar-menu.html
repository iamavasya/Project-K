<p-drawer [visible]="visible" (onHide)="close()" closable="true">
    <ng-template #headless>
        <div class="sidebar-header m-4 text-2xl font-bold border-b border-gray-300 pb-2">
            <h2>Project K</h2>
        </div>
        <div class="sidebar-content">
            <p-panelmenu [model]="(items$ | async) ?? []" class="m-2">
            </p-panelmenu>
        </div>
        <div class="sidebar-footer mt-auto p-4 border-t border-gray-300">
            <span class="pi pi-user"></span>
            <span class="ml-2">{{ (email$ | async) ?? 'Error' }}</span>
            <p-tag class="ml-2" severity="{{ getSeverityOnRole(role$ | async) }}" value="{{ (role$ | async) ?? 'Error' }}" />
        </div>
    </ng-template>
</p-drawer>
