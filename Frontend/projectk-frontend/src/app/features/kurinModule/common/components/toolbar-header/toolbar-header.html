<p-toolbar>
    <ng-template #start>
        <div class="flex items-center gap-2">
            <p-button icon="pi pi-bars" (onClick)="toggleSidebar()" text severity="secondary" />
        </div>
    </ng-template>

    <ng-template #end>
        <div>
            @if ((state$ | async)?.accessToken) {
                <app-logout-component></app-logout-component>
            }
        </div>
    </ng-template>
</p-toolbar>

<app-sidebar-menu [visible]="sidebarVisible" (visibleChange)="sidebarVisible = $event"></app-sidebar-menu>
