@if (state$ | async; as state) {
    @if (state.accessToken) {
    <p-toolbar>
        <ng-template #start>
            <div class="flex items-center gap-2">
                <p-button icon="pi pi-bars" (onClick)="toggleSidebar()" text severity="secondary" />
            </div>
        </ng-template>

        <ng-template #end>
            <div>
                @if (state.kurinKey && isAdmin(state.role)) {
                    <p-button (onClick)="backToKurinPanel()" label="Back to Admin Panel" variant="text" severity="info" icon="pi pi-arrow-left" iconPos="left" />
                }
                @if (state.accessToken) {
                    <app-logout-component></app-logout-component>
                }
            </div>
        </ng-template>
    </p-toolbar>

    <app-sidebar-menu [visible]="sidebarVisible" [state$]="state$" (visibleChange)="sidebarVisible = $event"></app-sidebar-menu>
    }
}
