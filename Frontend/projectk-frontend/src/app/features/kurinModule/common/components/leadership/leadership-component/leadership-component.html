<div class="card">
  <form [formGroup]="leadershipForm" (ngSubmit)="saveCadence()">
    
    <div class="mb-5">
        <div class="p-field w-full md:w-1/2">
            <label class="block mb-2 font-bold">Дата початку каденції*</label>
            <p-datepicker formControlName="startDate" appendTo="body" [style]="{'width':'100%'}"></p-datepicker>
        </div>
    </div>

    <p-table [value]="leadershipHistories.controls" formArrayName="leadershipHistories" stripedRows>
        
      <ng-template pTemplate="caption">
          <div class="flex justify-between items-center flex-wrap gap-2">
              <h3 class="text-xl font-bold">Склад проводу</h3>
              
              <div class="flex items-center gap-3">
                  <div *ngIf="showArchived">
                      <p-iconfield iconPosition="left">
                          <p-inputicon><i class="pi pi-search"></i></p-inputicon>
                          <input 
                              pInputText 
                              type="text" 
                              [(ngModel)]="searchTerm" 
                              [ngModelOptions]="{standalone: true}" 
                              placeholder="Пошук..." 
                              class="p-inputtext-sm w-40" />
                      </p-iconfield>
                  </div>

                  <div class="flex items-center gap-2">
                      <label class="text-sm text-gray-500 cursor-pointer select-none" for="archiveSwitch">Архів</label>
                      <p-toggleswitch 
                          [(ngModel)]="showArchived" 
                          [ngModelOptions]="{standalone: true}" 
                          inputId="archiveSwitch">
                      </p-toggleswitch>
                  </div>
              </div>
          </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th style="width: 20%">Роль</th>
          <th style="width: 35%">Учасник</th>
          <th style="width: 20%">Дата початку</th>
          <th style="width: 20%">Дата кінця</th>
          <th style="width: 5%"></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-rowControl let-i="rowIndex">
        <tr [formGroupName]="i" [hidden]="!isRowVisible(i)">
          
          <td>
            <span class="font-semibold">{{ getRoleDisplayName(rowControl.get('role')?.value) }}</span>
          </td>

          <td>
            <p-select 
                appendTo="body" 
                [options]="allMembers" 
                [filter]="true" 
                filterBy="firstName,lastName" 
                dataKey="memberKey" 
                optionLabel="lastName"
                [loading]="isLoading" 
                formControlName="member" 
                placeholder="Оберіть особу"
                [style]="{'width':'100%'}">
                
                <ng-template let-member pTemplate="selectedItem">
                    <div *ngIf="member">{{ member.lastName }} {{ member.firstName }}</div>
                </ng-template>
                <ng-template let-member pTemplate="item">
                    {{ member.lastName }} {{ member.firstName }}
                </ng-template>
            </p-select>
            <small *ngIf="rowControl.get('member')?.invalid && rowControl.get('member')?.touched" class="text-red-500 block mt-1">
                Обов'язкове поле
            </small>
          </td>

          <td>
            <p-datepicker appendTo="body" formControlName="startDate" [style]="{'width':'100%'}"></p-datepicker>
          </td>
          <td>
            <p-datepicker appendTo="body" formControlName="endDate" [style]="{'width':'100%'}"></p-datepicker>
          </td>

          <td class="text-right">
             <div class="flex gap-2 justify-end">
                <button 
                    *ngIf="canHaveMultipleMembers(rowControl.get('role')?.value)"
                    pButton type="button" icon="pi pi-plus" 
                    class="p-button-rounded p-button-text p-button-success"
                    (click)="addRoleRow(rowControl.get('role')?.value)"
                    pTooltip="Додати ще">
                </button>
                
                <button 
                    *ngIf="canHaveMultipleMembers(rowControl.get('role')?.value) || rowControl.get('member')?.value"
                    pButton type="button" icon="pi pi-trash" 
                    class="p-button-rounded p-button-text p-button-danger"
                    (click)="onRemoveRow(i)"
                    pTooltip="Очистити">
                </button>
             </div>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <div class="mt-4 flex">
        <p-button label="Зберегти" type="submit" [disabled]="leadershipForm.invalid"></p-button>
    </div>

  </form>
</div>
