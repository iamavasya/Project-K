<div class="admin-panel">
    <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-bold">Адміністрування</h2>
        <div class="flex gap-2">
            <p-button label="Черга заявок" icon="pi pi-list" severity="secondary" [routerLink]="['/waitlist']"></p-button>
            <p-button label="Користувачі" icon="pi pi-users" severity="secondary" [routerLink]="['/users']"></p-button>
        </div>
    </div>
    <p-table [value]="data" styleClass="project-table">
        <ng-template #caption>
            <div class="table-caption">
                <div>
                    <h3>Курені</h3>
                    <p>{{ data.length }} у системі</p>
                </div>
                <p-button (onClick)="onActionClick(null, 'create')" label="Створити" severity="info" icon="pi pi-plus" />
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th scope="col">Курінь</th>
                <th scope="col" class="admin-kurin-actions">Дії</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr class="admin-kurin-row">
                <td data-mobile-label="Курінь">
                    <div class="kurin-number-cell">
                        <span>{{ item.number }}</span>
                        <small>Номер куреня</small>
                    </div>
                </td>
                <td class="admin-kurin-actions" data-mobile-label="Дії">
                    <p-splitButton label="Відкрити" icon="pi pi-arrow-right" (onClick)="onOpenClick(item.kurinKey)" [model]="actions" (onDropdownClick)="prepareItemActions(item)">

                    </p-splitButton>
                </td>
            </tr>
        </ng-template>
    </p-table>
    @if (data.length === 0) {
        <div style="margin-top: 1rem;">
            <p-message icon="pi pi-question-circle" severity="info">Наразі немає доступних куренів. Створіть один!</p-message>
        </div>
    }
</div>
<app-manage-panel
  [(visible)]="managePanelVisible"
  [parameter]="managePanelParameter"
  [entity]="selectedItem"
  [config]="managePanelConfig"
  (actionPerformed)="onManageAction($event)"
></app-manage-panel>
