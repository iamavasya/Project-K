services:
  projectk-web:
    image: ghcr.io/iamavasya/projectk-web:${PROJECTK_VERSION:-0.14.2-beta}
    build:
      context: .
      dockerfile: Frontend/projectk-frontend/Dockerfile
    environment:
      PROJECTK_API_URL: ${PROJECTK_API_URL:-http://localhost:5205/api}
    ports:
      - "${PROJECTK_WEB_PORT:-8080}:80"
    depends_on:
      projectk-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  projectk-api:
    image: ghcr.io/iamavasya/projectk-api:${PROJECTK_VERSION:-0.14.2-beta}
    build:
      context: .
      dockerfile: Backend/Dockerfile
      args:
        NUGET_AUTH_TOKEN: ${PROJECTK_NUGET_AUTH_TOKEN:-${NUGET_AUTH_TOKEN:-}}
    environment:
      ASPNETCORE_ENVIRONMENT: SelfHost
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${PROJECTK_DB_CONNECTION_STRING}
      ConnectionStrings__BlobStorage: ${PROJECTK_BLOB_CONNECTION_STRING}
      BlobStorage__PublicBaseUrl: ${PROJECTK_BLOB_PUBLIC_BASE_URL:-http://localhost:10000/devstoreaccount1/photos}
      BlobStorage__ContainerName: ${PROJECTK_BLOB_CONTAINER:-photos}
      EnvCorsOrigin: ${PROJECTK_CORS_ORIGIN:-http://localhost:8080}
      Email__BaseUrl: ${PROJECTK_PUBLIC_URL:-http://localhost:8080}
      Jwt__Key: ${PROJECTK_JWT_KEY}
      Jwt__Issuer: ${PROJECTK_JWT_ISSUER:-ProjectK-Backend}
      Jwt__Audience: ${PROJECTK_JWT_AUDIENCE:-ProjectK-Users}
      Telegram__DevAlerts__Enabled: "false"
      Telegram__PublicChannel__Enabled: "false"
    ports:
      - "${PROJECTK_API_PORT:-5205}:8080"
    depends_on:
      projectk-sql:
        condition: service_healthy
      projectk-azurite:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  projectk-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: ${PROJECTK_SQL_EDITION:-Developer}
      MSSQL_SA_PASSWORD: ${PROJECTK_SQL_PASSWORD}
    ports:
      - "${PROJECTK_SQL_PORT:-1433}:1433"
    volumes:
      - projectk-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  projectk-azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data --silent
    ports:
      - "${PROJECTK_AZURITE_BLOB_PORT:-10000}:10000"
      - "${PROJECTK_AZURITE_QUEUE_PORT:-10001}:10001"
      - "${PROJECTK_AZURITE_TABLE_PORT:-10002}:10002"
    volumes:
      - projectk-azurite-data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net');const s=net.connect(10000,'127.0.0.1');s.on('connect',()=>process.exit(0));s.on('error',()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  projectk-sql-data:
    name: projectk-sql-data
  projectk-azurite-data:
    name: projectk-azurite-data
