name: Backend CI/CD

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'Backend/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract Release Info
      if: github.event_name == 'release'
      shell: bash
      run: |
        RAW_TAG="${{ github.event.release.tag_name }}"
        CLEAN_VERSION="${RAW_TAG#v}"
        RELEASE_NAME='${{ github.event.release.name }}'
        CODE_NAME=$(echo "$RELEASE_NAME" | grep -oP '"\K[^"]+' || echo "$RELEASE_NAME")
        echo "VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
        echo "CODENAME=$CODE_NAME" >> $GITHUB_ENV

    - name: Extract Dev Info
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      shell: bash
      run: |
        echo "VERSION=0.0.0-dev-${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "CODENAME=StagingBuild" >> $GITHUB_ENV

    - name: Inject Versioning
      shell: bash
      run: |
        FILES=$(find Backend/ProjectK.Backend/ProjectK.API/ -name "appsettings*.json")
        echo "Updating files: $FILES"
        for file in $FILES; do
          sed -i "s/v0.0.0-dev/${{ env.VERSION }}/g" "$file"
          sed -i "s/LocalDevelopment/${{ env.CODENAME }}/g" "$file"
        done

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Backend/ProjectK.Backend
      env: 
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_AUTH_TOKEN }}
      
    - name: Build
      run: dotnet build Backend/ProjectK.Backend --configuration Release --no-restore
    
    - name: Test
      run: dotnet test Backend/ProjectK.Backend --configuration Release --no-build --verbosity normal

    - name: Notify dev Telegram on backend failure
      if: failure()
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_DEV_ALERTS_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_DEV_ALERTS_CHAT_ID }}
        TELEGRAM_TEXT: |
          [ProjectK] Backend workflow failed
          Workflow: ${{ github.workflow }}
          Ref: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: bash .github/scripts/send-telegram-message.sh

    - name: Publish Artifact
      run: dotnet publish Backend/ProjectK.Backend/ProjectK.API/ProjectK.API.csproj -c Release -o ./publish
      
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-app
        path: ./publish/

  deploy:
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: 
      name: ${{ (github.ref == 'refs/heads/main' || github.event_name == 'release') && 'production' || 'staging' }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: dotnet-app

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: Create public release announcement draft
      if: github.event_name == 'release'
      shell: bash
      env:
        PROJECTK_API_BASE_URL: ${{ vars.PROJECTK_API_BASE_URL }}
        PROJECTK_SERVICE_TOKEN: ${{ secrets.PROJECTK_SERVICE_TOKEN }}
        ANNOUNCEMENT_TITLE: ${{ github.event.release.name }}
        ANNOUNCEMENT_BODY: ${{ github.event.release.body }}
        ANNOUNCEMENT_SOURCE_ID: ${{ github.event.release.tag_name }}
        ANNOUNCEMENT_SOURCE_URL: ${{ github.event.release.html_url }}
        ANNOUNCEMENT_ENVIRONMENT: production
        ANNOUNCEMENT_VERSION: ${{ github.event.release.tag_name }}
      run: bash .github/scripts/create-public-announcement-draft.sh

    - name: Notify dev Telegram on backend deploy failure
      if: failure()
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_DEV_ALERTS_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_DEV_ALERTS_CHAT_ID }}
        TELEGRAM_TEXT: |
          [ProjectK] Backend deploy failed
          Environment: ${{ (github.ref == 'refs/heads/main' || github.event_name == 'release') && 'production' || 'staging' }}
          Ref: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: bash .github/scripts/send-telegram-message.sh
