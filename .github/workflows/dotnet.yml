# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Backend CI (.NET)

on:
  push:
    branches: [ "main", "new-monolith" ]
    paths:
      - 'Backend/**'
  pull_request:
    branches: [ "main", "new-monolith" ]
    paths:
      - 'Backend/**'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Add GitHub Package Source
      run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/iamavasya/index.json"
    
    - name: Restore dependencies
      run: dotnet restore
      working-directory: Backend/ProjectK.Backend
      
    - name: Build
      run: dotnet build --no-restore
      working-directory: Backend/ProjectK.Backend
    
    - name: Test
      run: dotnet test --no-build --verbosity normal
      working-directory: Backend/ProjectK.Backend
