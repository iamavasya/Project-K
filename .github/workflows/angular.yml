name: Angular CI

on:
  push:
    branches: [ "new-monolith" ]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [ "new-monolith" ]
    paths:
      - 'Frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
        cache-dependency-path: Frontend/projectk-frontend/package-lock.json

    - run: npm ci
      working-directory: Frontend/projectk-frontend

    - name: Run lint
      run: npm run lint
      working-directory: Frontend/projectk-frontend

    - name: Build
      run: npm run build --if-present
      working-directory: Frontend/projectk-frontend

    - name: Test
      run: npm test
      working-directory: Frontend/projectk-frontend
