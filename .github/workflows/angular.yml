name: Angular CI

on:
  push:
    branches: [ "new-monolith" ]
    paths-ignore:
      - 'Project-K/Backend/**'
  pull_request:
    branches: [ "new-monolith" ]
    paths:
      - 'Project-K/Backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - run: npm ci
      working-directory: Frontend/projectk-frontend

    - name: Run lint
      run: npm run lint
      working-directory: Frontend/projectk-frontend

    - name: Build
      run: npm run build --if-present
      working-directory: Frontend/projectk-frontend

    - name: Test
      run: npm test
      working-directory: Frontend/projectk-frontend
